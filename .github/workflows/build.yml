# Publishes to CurseForge when a version tag is pushed (e.g. v1.0.0).
# Required: secrets.CF_API_TOKEN, vars.CF_PROJECT_ID (numeric project id from CurseForge sidebar).
name: Build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Read mod version
        id: mod_version
        run: echo "value=$(grep '^mod_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$prev" ]; then
            log=$(git log --pretty=format:"- %s (%h)" "$prev..HEAD")
          else
            log=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          {
            echo "value<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        if: startsWith(github.ref, 'refs/tags/v')
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: ${{ vars.CF_PROJECT_ID }}
          game_endpoint: minecraft
          file_path: build/libs/voxellink-${{ steps.mod_version.outputs.value }}.jar
          game_versions: Minecraft 1.21:1.21.1,Java 21,NeoForge
          relations: cc-tweaked:requiredDependency
          changelog: ${{ steps.changelog.outputs.value }}
          changelog_type: markdown
          release_type: release
